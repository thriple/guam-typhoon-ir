name: Guam IR Grabber

on:
  schedule:
    # Every 30 minutes. GitHub's scheduler is best-effort and can slip a
    # few minutes during high load, but it will not just stop -- and it
    # doesn't care about your local power or internet at all.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab

concurrency:
  group: guam-ir-grabber
  cancel-in-progress: false   # never cancel a run; just queue the next one

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run grabber
        run: python guam_ir_grabber.py --once --outdir frames

      - name: Commit any new frames
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frames
          if git diff --cached --quiet; then
            echo "No new frames this run."
          else
            git commit -m "Add new IR frame(s) $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
